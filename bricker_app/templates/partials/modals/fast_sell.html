<div class="modal fade" id="fastSellModal" tabindex="-1" aria-labelledby="fastSellModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white border-0 rounded-3 shadow">
      <div class="modal-header border-secondary">
        <h5 class="modal-title" id="fastSellModalLabel">
          <strong>Confirmar venda</strong>
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>

      <form id="fastSellForm" method="POST">
        {% csrf_token %}
        <div class="modal-body">
          <p class="mb-2">
            Você conseguiu vender o produto
            <strong id="fastSellProductName"></strong>
            pelo valor esperado?
            <strong>R$ <span id="fastSellExpectedValue"></span></strong>?
          </p>

          <p class="text-secondary small mb-3">
            Se não, insira abaixo por quanto voce vendeu
          </p>

          <div class="mb-3">
            <label for="fastSellPrice" class="form-label">Valor da venda</label>
            <input
              type="number"
              step="0.01"
              min="0"
              name="price_sold"
              id="fastSellPrice"
              class="form-control"
         
            >
            <div id="fastSellError" class="text-danger small mt-2"></div>
          </div>
        </div>

        <div class="modal-footer border-secondary">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            Cancelar
          </button>
          <button type="submit" class="btn btn-success">
            Confirmar venda
          </button>
        </div>
      </form>
    </div> 
  </div>
</div>
