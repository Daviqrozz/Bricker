{% load static %}
<header class="header-color shadow-sm sticky-top">
  <nav class="navbar navbar-expand-lg navbar-dark container">

    <!-- Logo -->
    <a class="navbar-brand fw-bold" href="{% url 'products_view' %}">
      <h2 class="mb-0">
        <i class="bi bi-box-seam me-2"></i>Bricker
      </h2>
    </a>

    <!-- Botões do lado direito -->
    {% if user.is_authenticated %}
    <div class="d-flex align-items-center ms-auto gap-2">

      <!-- Ajuda -->
      <button class="btn p-1" data-bs-toggle="modal" data-bs-target="#onBoardingModal" aria-label="Ajuda">
        <img src="{% static 'img/icons/help-circle.svg' %}" alt="Ajuda" style="width: 24px;">
      </button>

      <!-- Perfil -->
      <button
        class="btn p-0 d-flex align-items-center justify-content-center rounded-circle"
        style="width: 36px; height: 36px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);"
        data-bs-toggle="modal"
        data-bs-target="#userProfileModal"
        aria-label="Perfil do usuário"
      >
        <i class="bi bi-person-fill" style="font-size: 1.1rem; color: #F3F4F6;"></i>
      </button>

    </div>
    {% else %}
    <div class="ms-auto">
      <a href="{% url 'login' %}" class="btn btn-primary btn-sm rounded-pill px-3 text-white fw-bold">
        Bem vindo
      </a>
    </div>
    {% endif %}

  </nav>
</header>

{% include "partials/modals/user_modal.html" %}
