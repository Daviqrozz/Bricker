{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="{% static 'img/favicon/box.svg' %}">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'css/custom.css' %}">
  <link rel="manifest" href="{% static 'manifest.json' %}">

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"
    integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
  <title> Bricker | {% block title %} {% endblock %}</title>
</head>

<body class="main-color d-flex flex-column min-vh-100">

  {% include 'partials/header/header.html' %}

  <main class="py-4">
    <div class="container">
      {% block content %}
      {% endblock %}
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      {% if show_onboarding %}
      var onboardingModal = new bootstrap.Modal(document.getElementById('onBoardingModal'));
      onboardingModal.show();
      {% endif %}
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>

  <footer class="footer mt-auto py-3 bg-dark text-white">
    <div class="container text-center">
      <span>Desenvolvido por Flue Tecnologia ®</span>
    </div>
  </footer>

</body>

{% include 'partials/modals/onboarding.html' %}

</html>
